<header class="site-header">
  <div class="container">
    <div class="header-content">

      <a routerLink="/" class="logo">
        <img src="assets/images/log.png" alt="Досуг" class="logo-img">
      </a>

      <button class="mobile-menu-btn"
              [class.active]="isMobileMenuOpen"
              (click)="toggleMobileMenu()"
              aria-label="Menu">
        <span></span><span></span><span></span>
      </button>

      <nav class="main-nav" [class.active]="isMobileMenuOpen">
        <button class="close-menu-btn" (click)="closeMobileMenu()" aria-label="Close">×</button>
        <ul class="m-0 p-0 d-flex align-items-center">
          <li><a routerLink="/info-center" (click)="closeMobileMenu()">{{ 'NAV.INFO_CENTER' | t }}</a></li>
          <li><a routerLink="/events" (click)="closeMobileMenu()">{{ 'NAV.EVENTS' | t }}</a></li>
          <li><a routerLink="/routes" (click)="closeMobileMenu()">{{ 'NAV.ROUTES' | t }}</a></li>
        </ul>
      </nav>

      @if (isMobileMenuOpen) {
        <div class="menu-overlay" (click)="closeMobileMenu()"></div>
      }

      <div class="header-actions">

        <!-- Language switcher -->
        <div class="lang-switcher">
          <button
            class="lang-btn"
            [class.active]="currentLang === 'ru'"
            (click)="switchLang('ru')">RU
          </button>
          <span class="lang-sep">|</span>
          <button
            class="lang-btn"
            [class.active]="currentLang === 'en'"
            (click)="switchLang('en')">EN
          </button>
        </div>

        @if (!isLoggedIn) {
          <button class="btn-pastel auth-btn" (click)="openLogin()">
            <i class="bi bi-person"></i>
            {{ 'AUTH.LOGIN' | t }}
          </button>
        } @else {
          <div class="user-profile" (click)="toggleProfileMenu()">
            <div class="user-avatar">
              <img [src]="userAvatar" (error)="userAvatar = defaultAvatar" alt="Avatar">
            </div>
            <span class="user-name">{{ userName }}</span>

            @if (isProfileMenuOpen) {
              <div class="profile-menu">
                <button class="profile-menu-item" (click)="openProfile()">{{ 'AUTH.MY_PROFILE' | t }}</button>
                <button class="profile-menu-item" (click)="openMyEvents()">{{ 'AUTH.MY_EVENTS' | t }}</button>

                @if (isOrganizer || isAdmin) {
                  <ng-container *ngTemplateOutlet="organizerButtons"></ng-container>
                }

                @if (isAdmin) {
                  <div class="profile-menu-divider"></div>
                  <button class="profile-menu-item profile-menu-item--admin" (click)="openAdminPanel()">
                    <i class="bi bi-card-list"></i>
                    {{ 'AUTH.ADMIN_PANEL' | t }}
                  </button>
                }

                <div class="profile-menu-divider"></div>
                <button class="profile-menu-item profile-menu-item--logout" (click)="logout()">{{ 'AUTH.LOGOUT' | t }}
                </button>
              </div>
            }
          </div>
        }
      </div>
    </div>
  </div>
</header>

<ng-template #organizerButtons>
  <div class="profile-menu-divider"></div>
  <button class="profile-menu-item profile-menu-item--organizer" (click)="openCreateEvent()">
    <i class="bi bi-plus-lg"></i>
    {{ 'AUTH.CREATE_EVENT' | t }}
  </button>
  <button class="profile-menu-item profile-menu-item--organizer" (click)="openManageEvents()">
    <i class="bi bi-calendar-check"></i>
    {{ 'AUTH.MANAGE_EVENTS' | t }}
  </button>
  <div class="profile-menu-divider"></div>
  <button class="profile-menu-item profile-menu-item--organizer" (click)="openCreateRoute()">
    <i class="bi bi-plus-lg"></i>
    {{ 'AUTH.CREATE_ROUTE' | t }}
  </button>
  <button class="profile-menu-item profile-menu-item--organizer" (click)="openManageRoutes()">
    <i class="bi bi-map"></i>
    {{ 'AUTH.MANAGE_ROUTES' | t }}
  </button>
</ng-template>
